<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>چت بات هوشمند</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260515-6" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel" aria-label="چت بات">
        <header class="chat-header">
          <div class="brand-area">
            <button class="icon-button ghost" id="menuToggle" type="button" title="منو" aria-label="باز کردن منو" aria-expanded="false" aria-controls="sideMenu">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4.5 7.5h15M4.5 12h15M4.5 16.5h15" />
              </svg>
            </button>
            <div>
              <h1>چت بات هوشمند</h1>
              <div class="inline-status">
                <span class="status-dot" aria-hidden="true"></span>
                آماده پاسخ‌گویی
              </div>
            </div>
          </div>

          <div class="header-actions">
            <button class="icon-button ghost" id="clearChat" type="button" title="پاک کردن گفتگو" aria-label="پاک کردن گفتگو">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 12a8 8 0 1 1-2.34-5.66" />
                <path d="M20 4v5h-5" />
              </svg>
            </button>
          </div>
        </header>

        <aside class="side-menu" id="sideMenu" aria-hidden="true">
          <div class="menu-card">
            <div class="menu-grabber" aria-hidden="true"></div>

            <div class="account-hero">
              <div class="profile-avatar" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" />
                  <path d="M4.75 20.25a7.25 7.25 0 0 1 14.5 0" />
                </svg>
              </div>
              <div>
                <strong>فضای شخصی شما</strong>
                <span>برای ذخیره تاریخچه و تنظیمات وارد شوید</span>
              </div>
            </div>

            <button class="primary-menu-action" type="button">
              ورود / ساخت حساب
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m10 7 5 5-5 5" />
              </svg>
            </button>

            <div class="menu-list" aria-label="تنظیمات حساب">
              <button type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 3.75 19.25 8v8L12 20.25 4.75 16V8L12 3.75Z" />
                  <path d="M12 12 19.25 8M12 12 4.75 8M12 12v8.25" />
                </svg>
                <span>
                  <strong>فضای گفتگو</strong>
                  <small>مدیریت چت‌ها و داده‌ها</small>
                </span>
              </button>
              <button type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 12.5 10 17 19 7" />
                </svg>
                <span>
                  <strong>حریم خصوصی</strong>
                  <small>کنترل امنیت و دسترسی‌ها</small>
                </span>
              </button>
            </div>

            <div class="theme-box">
              <div>
                <strong>تم</strong>
                <span>روز یا شب</span>
              </div>
              <div class="theme-switch" role="group" aria-label="انتخاب تم">
                <button class="theme-option active" type="button" data-theme="light" aria-pressed="true">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 4V2M12 22v-2M4 12H2M22 12h-2M18.36 5.64l1.42-1.42M4.22 19.78l1.42-1.42M5.64 5.64 4.22 4.22M19.78 19.78l-1.42-1.42" />
                    <path d="M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" />
                  </svg>
                </button>
                <button class="theme-option" type="button" data-theme="dark" aria-pressed="false">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M20.25 14.22A7.7 7.7 0 0 1 9.78 3.75 8.25 8.25 0 1 0 20.25 14.22Z" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </aside>
        <div class="menu-backdrop" id="menuBackdrop"></div>

        <div class="messages" id="messages" aria-live="polite"></div>

        <form class="composer" id="chatForm">
          <label class="sr-only" for="messageInput">پیام شما</label>
          <textarea id="messageInput" rows="1" placeholder="پیامت را بنویس..." autocomplete="off"></textarea>
          <button class="send-button" type="submit" aria-label="ارسال پیام">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m5 12 14-7-4.5 14-2.8-5.7L5 12Z" />
              <path d="m11.7 13.3 3.5-3.5" />
            </svg>
          </button>
        </form>
      </section>
    </main>

    <template id="messageTemplate">
      <article class="message">
        <div class="bubble">
          <p></p>
          <time></time>
        </div>
      </article>
    </template>

    <script type="module" src="script.js?v=20260515-6"></script>
  </body>
</html>
