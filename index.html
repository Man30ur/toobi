<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>HORTON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260521-1" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel" aria-label="چت بات">
        <header class="chat-header">
          <div class="brand-area">
            <button class="icon-button ghost" id="menuToggle" type="button" title="منو" aria-label="باز کردن منو" aria-expanded="false" aria-controls="sideMenu">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4.5 7.5h15M4.5 12h15M4.5 16.5h15" />
              </svg>
            </button>
            <div>
              <h1>HORTON</h1>
              <p class="runtime-status" id="runtimeStatus" data-state="idle"></p>
            </div>
          </div>

          <div class="header-actions">
            <button class="icon-button ghost" id="newChatHeader" type="button" title="گفتگوی تازه" aria-label="گفتگوی تازه">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
          </div>
        </header>

        <aside class="side-menu" id="sideMenu" aria-hidden="true">
          <div class="menu-card">
            <div class="menu-grabber" aria-hidden="true"></div>

            <div class="account-hero">
              <div class="profile-avatar brand-avatar" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M12 3.75 14.1 9.9 20.25 12l-6.15 2.1L12 20.25 9.9 14.1 3.75 12 9.9 9.9 12 3.75Z" />
                </svg>
              </div>
              <div class="account-copy">
                <strong id="accountTitle">HORTON</strong>
                <span id="accountSummary">برای ذخیره گفتگوها وارد حساب شو</span>
              </div>
            </div>

            <div class="account-panel" id="accountPanel">
              <button class="account-button" id="authOpenButton" type="button">
                <span>ورود یا ثبت نام</span>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                  <path d="m10 17 5-5-5-5" />
                  <path d="M15 12H3" />
                </svg>
              </button>

              <form class="profile-form" id="profileForm" hidden>
                <label>
                  <span>نام نمایشی</span>
                  <input id="profileName" type="text" maxlength="80" autocomplete="name" placeholder="مثلاً منصور" />
                </label>
                <label>
                  <span>آدرس تصویر پروفایل</span>
                  <input id="profileAvatar" type="url" maxlength="500" inputmode="url" placeholder="https://..." />
                </label>
                <div class="profile-actions">
                  <button class="small-action primary" type="submit">ذخیره</button>
                  <button class="small-action" id="logoutButton" type="button">خروج</button>
                </div>
              </form>
            </div>

            <div class="history-panel">
              <input
                class="history-search"
                id="historySearch"
                type="search"
                inputmode="search"
                placeholder="جستجو در گفتگوها"
                autocomplete="off"
                aria-label="جستجو در تاریخچه گفتگوها"
              />
              <div class="history-list" id="historyList" aria-label="تاریخچه چت‌ها"></div>
            </div>

            <div class="theme-box icon-only">
              <div class="theme-switch" role="group" aria-label="انتخاب تم">
                <button class="theme-option active" type="button" data-theme="light" aria-pressed="true">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 4V2M12 22v-2M4 12H2M22 12h-2M18.36 5.64l1.42-1.42M4.22 19.78l1.42-1.42M5.64 5.64 4.22 4.22M19.78 19.78l-1.42-1.42" />
                    <path d="M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" />
                  </svg>
                </button>
                <button class="theme-option" type="button" data-theme="dark" aria-pressed="false">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M20.25 14.22A7.7 7.7 0 0 1 9.78 3.75 8.25 8.25 0 1 0 20.25 14.22Z" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </aside>
        <div class="menu-backdrop" id="menuBackdrop"></div>

        <div class="messages" id="messages" aria-live="polite"></div>

        <form class="composer" id="chatForm">
          <label class="sr-only" for="messageInput">پیام شما</label>
          <textarea id="messageInput" rows="1" placeholder="پیامت را بنویس..." autocomplete="off"></textarea>
          <button class="send-button" type="submit" aria-label="ارسال پیام">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m5 12 14-7-4.5 14-2.8-5.7L5 12Z" />
              <path d="m11.7 13.3 3.5-3.5" />
            </svg>
          </button>
        </form>
      </section>
    </main>

    <template id="messageTemplate">
      <article class="message">
        <div class="bubble">
          <div class="message-content"></div>
          <time></time>
        </div>
      </article>
    </template>

    <dialog class="auth-dialog" id="authDialog" aria-labelledby="authTitle">
      <form class="auth-card" id="authForm" method="dialog">
        <button class="auth-close" id="authClose" type="button" aria-label="بستن">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6l12 12M18 6 6 18" />
          </svg>
        </button>
        <div class="auth-heading">
          <strong id="authTitle">ورود به HORTON</strong>
          <span id="authHint">شماره موبایل را وارد کن تا کد تایید تستی ساخته شود.</span>
        </div>
        <label class="auth-field">
          <span>شماره موبایل</span>
          <input id="authPhone" type="tel" inputmode="tel" autocomplete="tel" placeholder="09123456789" />
        </label>
        <label class="auth-field otp-step" id="otpStep" hidden>
          <span>کد تایید</span>
          <input id="authCode" type="text" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="کد ۶ رقمی" />
        </label>
        <label class="auth-field otp-step" id="nameStep" hidden>
          <span>نام نمایشی</span>
          <input id="authName" type="text" maxlength="80" autocomplete="name" placeholder="اختیاری" />
        </label>
        <p class="demo-code" id="demoCode" hidden></p>
        <button class="auth-submit" id="authSubmit" type="submit">دریافت کد</button>
      </form>
    </dialog>

    <div class="toast-host" id="toastHost" aria-live="polite" aria-atomic="true"></div>
    <script type="module" src="script.js?v=20260521-1"></script>
  </body>
</html>
